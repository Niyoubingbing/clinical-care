<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1080" viewBox="0 0 2400 1080">
  <defs>
    <radialGradient id="bg1" cx="18%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#f7d7c8"/>
      <stop offset="46%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#d8ecff" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#f6efe9" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f7fafc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.76"/>
      <stop offset="46%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#eef6ff" stop-opacity="0.56"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#f2f8ff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="glassSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cf8269"/>
      <stop offset="100%" stop-color="#a95c48"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef7a7a"/>
      <stop offset="100%" stop-color="#bf4545"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7b15a"/>
      <stop offset="100%" stop-color="#bd7b28"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#5f6f80" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.55"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#506070" flood-opacity="0.12"/>
    </filter>
    <style>
      .text { fill:#1f252b; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif; }
      .muted { fill:#687480; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif; }
      .white { fill:#fff; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Microsoft YaHei",sans-serif; }
      .title { font-size:36px; font-weight:760; letter-spacing:0; }
      .h2 { font-size:24px; font-weight:720; }
      .body { font-size:23px; font-weight:560; }
      .small { font-size:19px; font-weight:560; }
      .tiny { font-size:16px; font-weight:620; }
      .card { fill:url(#glass); stroke:rgba(255,255,255,.78); stroke-width:1.4; filter:url(#softShadow); }
      .chip { fill:url(#glassSoft); stroke:rgba(255,255,255,.72); stroke-width:1.2; }
      .hair { stroke:rgba(255,255,255,.65); stroke-width:1; }
      .outline { stroke:rgba(113,130,148,.18); stroke-width:1.2; }
    </style>
