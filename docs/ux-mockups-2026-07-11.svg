<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="980" viewBox="0 0 2200 980">
  <defs>
    <style>
      .bg { fill: #f6f1eb; }
      .phone { fill: #fbf8f4; stroke: #e4d9cf; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #eadfd6; stroke-width: 1.5; }
      .soft { fill: #f2ece6; }
      .primary { fill: #b8674f; }
      .danger { fill: #c84b4b; }
      .warn { fill: #c8872c; }
      .info { fill: #4b7f9f; }
      .text { fill: #342f2b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
      .muted { fill: #8a7e75; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
      .white { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
      .tiny { font-size: 18px; }
      .small { font-size: 22px; }
      .body { font-size: 25px; }
      .title { font-size: 34px; font-weight: 700; }
      .section { font-size: 22px; font-weight: 650; }
      .label { font-size: 18px; font-weight: 650; }
      .bold { font-weight: 700; }
      .line { stroke: #eadfd6; stroke-width: 1.5; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(83, 58, 42, 0.08)); }
    </style>
