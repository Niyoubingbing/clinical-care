name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript (strict, noEmit)
        run: npx tsc --noEmit

      # 后续接入单测后取消注释：
      # - name: Unit tests
      #   run: npm test
